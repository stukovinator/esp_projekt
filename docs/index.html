<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Termometr" />
    <meta name="theme-color" content="#000000" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icon.png" />
    <title>Termometr</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;600;700&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --bg: #000000;
            --card: #1c1c1e;
            --card2: #2c2c2e;
            --sep: #38383a;
            --accent: #0a84ff;
            --green: #30d158;
            --red: #ff453a;
            --orange: #ff9f0a;
            --text: #ffffff;
            --text-sec: #ebebf599;
            --text-ter: #ebebf54d;
            --radius: 16px;
            --radius-sm: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            height: 100%;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', -apple-system, sans-serif;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 20px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 390px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Nagłówek */
        .header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            padding: 0 4px;
            margin-bottom: 4px;
        }

        .header-left h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            line-height: 1.1;
        }

        .header-left p {
            font-size: 13px;
            font-weight: 400;
            color: var(--text-sec);
            margin-top: 2px;
        }

        /* Pill statusu */
        .status-pill {
            display: flex;
            align-items: center;
            gap: 5px;
            background: var(--card);
            border-radius: 100px;
            padding: 6px 11px 6px 8px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-sec);
            transition: all 0.4s ease;
            margin-top: 4px;
        }

        .status-pill.online {
            background: rgba(48, 209, 88, 0.15);
            color: var(--green);
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--red);
            flex-shrink: 0;
            transition: background 0.4s;
        }

        .status-pill.online .status-dot {
            background: var(--green);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.3);
                opacity: 0.6;
            }
        }

        /* Główna karta */
        .main-card {
            background: var(--card);
            border-radius: 20px;
            padding: 28px 28px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
        }

        .main-card-label {
            font-size: 13px;
            font-weight: 400;
            color: var(--text-sec);
            letter-spacing: 0.01em;
            align-self: flex-start;
            margin-bottom: 16px;
        }

        /* Ogromna liczba */
        .temp-row {
            display: flex;
            align-items: flex-start;
            gap: 0;
        }

        .temp-num {
            font-size: 96px;
            font-weight: 200;
            line-height: 0.9;
            letter-spacing: -6px;
            color: var(--text);
            transition: color 0.5s ease;
        }

        .temp-num.loading {
            color: var(--text-ter);
        }

        .temp-num.warm {
            color: var(--orange);
        }

        .temp-symbol {
            display: flex;
            flex-direction: column;
            padding-top: 8px;
            margin-left: 4px;
        }

        .temp-deg {
            font-size: 32px;
            font-weight: 300;
            color: var(--text-sec);
            line-height: 1;
            letter-spacing: -1px;
        }

        .temp-unit {
            font-size: 18px;
            font-weight: 400;
            color: var(--text-ter);
            letter-spacing: 0.05em;
            margin-top: 2px;
        }

        /* Pasek postępu */
        .progress-wrap {
            width: 100%;
            margin-top: 24px;
        }

        .progress-track {
            width: 100%;
            height: 4px;
            background: var(--sep);
            border-radius: 100px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 100px;
            background: var(--accent);
            transition: width 1s cubic-bezier(0.16, 1, 0.3, 1), background 0.5s ease;
            width: 0%;
        }

        .progress-fill.warm {
            background: var(--orange);
        }

        .progress-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 6px;
        }

        .progress-labels span {
            font-size: 11px;
            font-weight: 400;
            color: var(--text-ter);
        }

        /* Separator */
        .sep-line {
            width: 100%;
            height: 1px;
            background: var(--sep);
            margin-top: 20px;
        }

        /* Status tekst pod linią */
        .temp-footer {
            width: 100%;
            text-align: center;
            font-size: 12px;
            font-weight: 400;
            color: var(--text-ter);
            margin-top: 12px;
            letter-spacing: 0.02em;
        }

        /* Siatka statystyk */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .stat-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 18px 18px 16px;
        }

        .stat-icon-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 10px;
        }

        .stat-icon {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .stat-icon.cold {
            background: rgba(10, 132, 255, 0.15);
        }

        .stat-icon.hot {
            background: rgba(255, 159, 10, 0.15);
        }

        .stat-icon.hum {
            background: rgba(48, 209, 88, 0.15);
        }

        /* Karta wilgotności */
        .hum-card {
            background: var(--card);
            border-radius: 20px;
            padding: 22px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .hum-left {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .hum-label {
            font-size: 13px;
            font-weight: 400;
            color: var(--text-sec);
        }

        .hum-row {
            display: flex;
            align-items: flex-end;
            gap: 3px;
        }

        .hum-num {
            font-size: 52px;
            font-weight: 200;
            line-height: 1;
            letter-spacing: -3px;
            color: var(--green);
            transition: color 0.5s;
        }

        .hum-num.loading {
            color: var(--text-ter);
        }

        .hum-unit {
            font-size: 22px;
            font-weight: 300;
            color: var(--text-ter);
            padding-bottom: 6px;
        }

        .hum-bar-wrap {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: flex-end;
        }

        .hum-bar-track {
            width: 100%;
            height: 4px;
            background: var(--sep);
            border-radius: 100px;
            overflow: hidden;
        }

        .hum-bar-fill {
            height: 100%;
            border-radius: 100px;
            background: var(--green);
            transition: width 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .hum-desc {
            font-size: 11px;
            color: var(--text-ter);
            font-weight: 400;
        }

        .stat-title {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-sec);
        }

        .stat-num {
            font-size: 30px;
            font-weight: 300;
            letter-spacing: -1.5px;
            line-height: 1;
        }

        .stat-num.cold {
            color: var(--accent);
        }

        .stat-num.hot {
            color: var(--orange);
        }

        .stat-num.empty {
            color: var(--text-ter);
            font-size: 24px;
        }

        .stat-sub {
            font-size: 12px;
            color: var(--text-ter);
            margin-top: 2px;
            font-weight: 400;
        }

        /* Karta wykresu */
        .chart-card {
            background: var(--card);
            border-radius: 20px;
            padding: 20px 20px 16px;
        }

        .chart-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .chart-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
        }

        .chart-subtitle {
            font-size: 11px;
            font-weight: 400;
            color: var(--text-ter);
            margin-top: 2px;
        }

        .chart-wrap {
            position: relative;
            height: 120px;
        }

        /* Karta ostatniego odczytu */
        .update-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 16px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .update-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .update-icon {
            width: 36px;
            height: 36px;
            background: rgba(10, 132, 255, 0.12);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .update-title {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-sec);
        }

        .update-val {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            margin-top: 1px;
            letter-spacing: -0.2px;
            font-variant-numeric: tabular-nums;
        }

        /* Przycisk */
        .refresh-btn {
            width: 100%;
            padding: 17px;
            background: var(--accent);
            border: none;
            border-radius: var(--radius);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.2px;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.15s;
            -webkit-font-smoothing: antialiased;
        }

        .refresh-btn:active {
            opacity: 0.8;
            transform: scale(0.98);
        }

        .refresh-btn:disabled {
            opacity: 0.35;
            cursor: default;
            transform: none;
        }

        /* Animacje wejścia */
        .container>* {
            animation: rise 0.55s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .container>*:nth-child(1) {
            animation-delay: 0.04s;
        }

        .container>*:nth-child(2) {
            animation-delay: 0.10s;
        }

        .container>*:nth-child(3) {
            animation-delay: 0.16s;
        }

        .container>*:nth-child(4) {
            animation-delay: 0.22s;
        }

        .container>*:nth-child(5) {
            animation-delay: 0.28s;
        }

        @keyframes rise {
            from {
                opacity: 0;
                transform: translateY(18px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes numPop {
            0% {
                transform: scale(1);
            }

            35% {
                transform: scale(1.03);
            }

            100% {
                transform: scale(1);
            }
        }

        .temp-num.pop {
            animation: numPop 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>

<body>
    <div class="container">

        <!-- Nagłówek -->
        <div class="header">
            <div class="header-left">
                <h1>Termometr</h1>
                <p>ESP32 · DHT11</p>
            </div>
            <div class="status-pill" id="statusPill">
                <div class="status-dot"></div>
                <span id="statusText">—</span>
            </div>
        </div>

        <!-- Główna karta -->
        <div class="main-card">
            <span class="main-card-label">Temperatura w pomieszczeniu</span>
            <div class="temp-row">
                <span class="temp-num loading" id="tempNum">--</span>
                <div class="temp-symbol">
                    <span class="temp-deg">°</span>
                    <span class="temp-unit">C</span>
                </div>
            </div>
            <div class="progress-wrap">
                <div class="progress-track">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-labels">
                    <span>−10°</span>
                    <span>0°</span>
                    <span>10°</span>
                    <span>20°</span>
                    <span>30°</span>
                    <span>40°</span>
                </div>
            </div>
            <div class="sep-line"></div>
            <div class="temp-footer" id="tempFooter">Oczekiwanie na dane…</div>
        </div>

        <!-- Wykres 24h -->
        <div class="chart-card">
            <div class="chart-header">
                <div>
                    <div class="chart-title">Historia temperatury</div>
                    <div class="chart-subtitle">Ostatnie 24 godziny</div>
                </div>
            </div>
            <div class="chart-wrap">
                <canvas id="tempChart"></canvas>
            </div>
        </div>

        <!-- Wilgotność -->
        <div class="hum-card">
            <div class="hum-left">
                <span class="hum-label">Wilgotność</span>
                <div class="hum-row">
                    <span class="hum-num loading" id="humNum">--</span>
                    <span class="hum-unit">%</span>
                </div>
            </div>
            <div class="hum-bar-wrap">
                <div class="hum-bar-track">
                    <div class="hum-bar-fill" id="humBar" style="width:0%"></div>
                </div>
                <span class="hum-desc" id="humDesc">oczekiwanie…</span>
            </div>
        </div>

        <!-- Statystyki -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon-row">
                    <div class="stat-icon cold">🧊</div>
                    <span class="stat-title">Minimum</span>
                </div>
                <div class="stat-num cold empty" id="minVal">—</div>
                <div class="stat-sub" id="minSub">sesja</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon-row">
                    <div class="stat-icon hot">🌡️</div>
                    <span class="stat-title">Maksimum</span>
                </div>
                <div class="stat-num hot empty" id="maxVal">—</div>
                <div class="stat-sub" id="maxSub">sesja</div>
            </div>
        </div>

        <!-- Ostatni odczyt -->
        <div class="update-card">
            <div class="update-left">
                <div class="update-icon">🕐</div>
                <div>
                    <div class="update-title">Ostatni odczyt</div>
                    <div class="update-val" id="lastUpdate">—</div>
                </div>
            </div>
        </div>

        <!-- Przycisk -->
        <button class="refresh-btn" id="refreshBtn" onclick="fetchTemp()">Odśwież</button>

    </div>

    <script>
        const API_URL = 'https://espprojekt-production.up.railway.app/temperature';
        const HISTORY_URL = 'https://espprojekt-production.up.railway.app/history?hours=24';
        const INTERVAL = 10000;
        const HISTORY_INTERVAL = 60000;
        const MAX_AGE = 90;
        const TEMP_MIN = -10;
        const TEMP_MAX = 40;

        let minTemp = null, maxTemp = null, prevTemp = null;
        let chart = null;

        const tempNumEl = document.getElementById('tempNum');
        const humNumEl = document.getElementById('humNum');
        const humBar = document.getElementById('humBar');
        const humDesc = document.getElementById('humDesc');
        const statusPill = document.getElementById('statusPill');
        const statusText = document.getElementById('statusText');
        const lastUpdateEl = document.getElementById('lastUpdate');
        const tempFooterEl = document.getElementById('tempFooter');
        const minEl = document.getElementById('minVal');
        const maxEl = document.getElementById('maxVal');
        const progressFill = document.getElementById('progressFill');
        const refreshBtn = document.getElementById('refreshBtn');

        function humLabel(hum) {
            if (hum < 30) return 'sucho';
            if (hum < 60) return 'komfortowo';
            if (hum < 80) return 'wilgotno';
            return 'bardzo wilgotno';
        }

        function setHumidity(hum) {
            if (hum === null || hum === undefined) return;
            humNumEl.textContent = Math.round(hum);
            humNumEl.classList.remove('loading');
            humBar.style.width = Math.min(100, hum) + '%';
            humDesc.textContent = humLabel(hum);
        }

        // Inicjalizacja wykresu
        function initChart() {
            const ctx = document.getElementById('tempChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        data: [],
                        borderColor: '#0a84ff',
                        borderWidth: 2,
                        pointRadius: 0,
                        pointHoverRadius: 4,
                        pointHoverBackgroundColor: '#0a84ff',
                        fill: true,
                        backgroundColor: (ctx) => {
                            const gradient = ctx.chart.ctx.createLinearGradient(0, 0, 0, 120);
                            gradient.addColorStop(0, 'rgba(10, 132, 255, 0.2)');
                            gradient.addColorStop(1, 'rgba(10, 132, 255, 0)');
                            return gradient;
                        },
                        tension: 0.4,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: { duration: 600, easing: 'easeInOutQuart' },
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#2c2c2e',
                            titleColor: '#ebebf599',
                            bodyColor: '#ffffff',
                            borderColor: '#38383a',
                            borderWidth: 1,
                            padding: 10,
                            titleFont: { family: 'Outfit', size: 11 },
                            bodyFont: { family: 'Outfit', size: 14, weight: '600' },
                            callbacks: {
                                title: (items) => items[0].label,
                                label: (item) => ` ${item.raw.toFixed(1)}°C`,
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            border: { display: false },
                            ticks: {
                                color: 'rgba(235,235,245,0.3)',
                                font: { family: 'Outfit', size: 10 },
                                maxTicksLimit: 6,
                                maxRotation: 0,
                            }
                        },
                        y: {
                            grid: { color: 'rgba(235,235,245,0.05)', drawBorder: false },
                            border: { display: false },
                            ticks: {
                                color: 'rgba(235,235,245,0.3)',
                                font: { family: 'Outfit', size: 10 },
                                maxTicksLimit: 4,
                                callback: (v) => v + '°'
                            }
                        }
                    }
                }
            });
        }

        async function fetchHistory() {
            try {
                const res = await fetch(HISTORY_URL, { cache: 'no-store' });
                const data = await res.json();
                if (!data.length) return;

                const labels = data.map(d => {
                    const t = new Date(d.timestamp.replace(' ', 'T'));
                    return t.getHours().toString().padStart(2, '0') + ':' + t.getMinutes().toString().padStart(2, '0');
                });
                const values = data.map(d => parseFloat(d.temperature));

                chart.data.labels = labels;
                chart.data.datasets[0].data = values;
                chart.update();
            } catch (e) {
                console.warn('Historia niedostępna', e);
            }
        }

        function setOnline(on) {
            statusPill.classList.toggle('online', on);
            statusText.textContent = on ? 'Online' : 'Offline';
        }

        function formatTime(str) {
            if (!str) return '—';
            return str.replace('T', ' ').substring(0, 16);
        }

        function isFresh(ts) {
            if (!ts) return false;
            return (new Date() - new Date(ts.replace(' ', 'T'))) / 1000 < MAX_AGE;
        }

        function setProgress(temp) {
            const pct = Math.max(0, Math.min(100, (temp - TEMP_MIN) / (TEMP_MAX - TEMP_MIN) * 100));
            progressFill.style.width = pct + '%';
            progressFill.classList.toggle('warm', temp >= 24);
        }

        async function fetchTemp() {
            refreshBtn.disabled = true;
            refreshBtn.textContent = 'Ładowanie…';

            try {
                const res = await fetch(API_URL, { cache: 'no-store' });
                const data = await res.json();
                const temp = data.temperature;

                if (temp !== null && temp !== undefined) {
                    const val = parseFloat(temp);
                    const str = val.toFixed(1);

                    if (prevTemp !== null && prevTemp !== str) {
                        tempNumEl.classList.remove('pop');
                        void tempNumEl.offsetWidth;
                        tempNumEl.classList.add('pop');
                    }
                    prevTemp = str;

                    tempNumEl.textContent = str;
                    tempNumEl.classList.remove('loading');
                    tempNumEl.classList.toggle('warm', val >= 24);
                    setProgress(val);
                    setHumidity(data.humidity);

                    if (minTemp === null || val < minTemp) {
                        minTemp = val;
                        minEl.textContent = val.toFixed(1) + '°';
                        minEl.classList.remove('empty');
                    }
                    if (maxTemp === null || val > maxTemp) {
                        maxTemp = val;
                        maxEl.textContent = val.toFixed(1) + '°';
                        maxEl.classList.remove('empty');
                    }

                    const fresh = isFresh(data.last_updated);
                    setOnline(fresh);
                    lastUpdateEl.textContent = formatTime(data.last_updated);
                    tempFooterEl.textContent = fresh ? 'Dane aktualne' : 'Urządzenie offline';
                } else {
                    setOnline(false);
                    tempFooterEl.textContent = 'Brak danych z czujnika';
                }

            } catch (e) {
                setOnline(false);
                tempNumEl.classList.add('loading');
                tempFooterEl.textContent = 'Błąd połączenia';
            }

            refreshBtn.disabled = false;
            refreshBtn.textContent = 'Odśwież';
        }

        // Start
        initChart();
        fetchTemp();
        fetchHistory();
        setInterval(fetchTemp, INTERVAL);
        setInterval(fetchHistory, HISTORY_INTERVAL);
    </script>
</body>

</html>
